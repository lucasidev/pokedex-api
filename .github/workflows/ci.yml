name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Catch a Windows-regenerated lockfile (npm/cli#4828) that dropped the
      # linux platform binaries, before it fails the install or lint late.
      - name: Verify lockfile platform binaries
        run: node scripts/check-lockfile-platforms.mjs

      - name: Install dependencies
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Rebuild native modules
        run: npm rebuild bcrypt

      # Cache the mongod binary mongodb-memory-server downloads. Key includes
      # the lockfile hash so a mongodb-memory-server bump (new mongod version)
      # gets a fresh cache instead of restoring a stale binary.
      - name: Cache mongodb-memory-server binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: mongodb-binaries-${{ runner.os }}-

      # Download the mongod binary once, serially, before jest's parallel
      # workers race on the download lock (UnableToUnlockLockfileError).
      - name: Pre-download mongod binary
        run: node scripts/predownload-mongo.mjs

      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (Jest + Supertest + mongodb-memory-server)
        run: npm test -- --ci --coverage

      - name: Build
        run: npm run build

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage
          retention-days: 7

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: pokedex-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image starts
        run: |
          set -euo pipefail
          docker run --rm \
            -e MONGODB_URI=mongodb://placeholder:27017/test \
            -e JWT_SECRET=ci-jwt-secret-must-be-at-least-32-chars-long \
            -e ADMIN_PASSWORD=ci-admin-password \
            --entrypoint node \
            pokedex-api:ci -e "console.log('image runs')"

  publish:
    name: Publish image (GHCR)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom

      - name: Scan SBOM for vulnerabilities (grype)
        uses: anchore/scan-action@v3
        with:
          sbom: sbom.cdx.json
          fail-build: false
          severity-cutoff: high

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality
    # Requires SONAR_TOKEN secret in repo settings. Skip if not configured.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage from the quality job
        uses: actions/download-artifact@v7
        with:
          name: coverage
          path: coverage

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v8
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  snyk:
    name: Snyk
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: quality
    # Requires SNYK_TOKEN secret. Skip if not configured.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v6

      - uses: snyk/actions/setup@master

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm install --no-audit --no-fund --ignore-scripts

      - name: Snyk test
        if: ${{ env.SNYK_TOKEN != '' }}
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
