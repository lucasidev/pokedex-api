version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Argentina/Buenos_Aires"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "dependencies"
    # Tier 1: framework core: ignore major bumps (security advisories bypassan).
    ignore:
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "mongoose"
        update-types: ["version-update:semver-major"]
      - dependency-name: "helmet"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jsonwebtoken"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      # Tier 2: test harness + typescript: major manual.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "ts-jest"
        update-types: ["version-update:semver-major"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Argentina/Buenos_Aires"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Argentina/Buenos_Aires"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "dependencies"
      - "infra"
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
